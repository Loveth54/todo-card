<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<article data-testid="test-todo-card">

  <h2 data-testid="test-todo-title">Learn JavaScript</h2>

  <p data-testid="test-todo-description">
    Practice DOM manipulation and build a mini app.
  </p>

  <strong data-testid="test-todo-priority">High</strong>

  <time data-testid="test-todo-due-date">
    Due Mar 1, 2026 18:00
  </time>

  <span data-testid="test-todo-time-remaining"></span>

  <strong data-testid="test-todo-status">Pending</strong>

  <label>
    <input type="checkbox" data-testid="test-todo-complete-toggle">
    Mark Complete
  </label>

  <ul data-testid="test-todo-tags" role="list">
    <li data-testid="test-todo-tag-work">Work</li>
    <li data-testid="test-todo-tag-urgent">Urgent</li>
  </ul>

  <button data-testid="test-todo-edit-button">Edit</button>

  <button data-testid="test-todo-delete-button">Delete</button>

</article>

<script src="script.js"></script>

</body>
</html>
